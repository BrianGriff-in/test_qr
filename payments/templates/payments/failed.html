{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Failed</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
    .app-card { border-radius: 16px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .x-circle { width: 72px; height: 72px; background: #dc2626; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; color: white; margin: 0 auto 20px; animation: pop .4s ease; }
    @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
    .btn-khqr { background: #d0021b; border: none; border-radius: 10px; padding: 12px; font-weight: 600; }
    .btn-khqr:hover { background: #a8001a; }
    .footer-note { font-size: 11px; color: #aaa; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3" style="min-height:100vh;">
  <div class="app-card bg-white text-center" style="max-width:440px;width:100%;">
    <div class="x-circle">✕</div>
    <h4 class="fw-semibold text-danger mb-1">Payment Failed</h4>
    <p class="text-muted mb-4" style="font-size:13px;">Something went wrong with your payment</p>
    <p class="text-muted mb-4" style="font-size:13px;">Order ref: <strong>{{ order.reference }}</strong></p>
    <a href="/" class="btn btn-khqr text-white w-100">
      <i class="bi bi-arrow-clockwise me-2"></i>Try again
    </a>
    <p class="footer-note text-center mt-3 mb-0">
      <i class="bi bi-shield-lock-fill me-1"></i>Secured by Bakong NBC · National Bank of Cambodia
    </p>
  </div>
</body>
</html>
